name: Demos

# Screen-recorded product demos from the Tier-2 GNOME VM (e2e/gnome/vm/
# demo.sh): the reversible `try` arc, the permanent `service install` arc
# (recorded continuously across a relogin) and its `service uninstall` reversal,
# typed live into gnome-terminal windows on a real Ubuntu desktop. Captured
# host-side over VNC with gstreamer (record.sh) — the in-guest screencast can't
# span the relogin. One leg per supported Ubuntu series (24.04 + 26.04).
#
# Each leg uploads its webm/mp4/webp as a run artifact, publishes them to the
# secrets-dispatcher-ci-media sidecar repo (pr-<N>/ for PRs, latest/ on master,
# served by GitHub Pages), and embeds the webp preview + full-video links in its
# own run summary — so the demo is viewable straight from the commit's checks,
# with no PR comment.
#
# Runs on PRs and master pushes that touch the product CLI or the demo harness
# — the only things that change what the demo shows — plus on demand. NOT a
# required check: a demo flake must not block a merge (keep it out of branch
# protection).

on:
  pull_request:
    branches: [master]
    paths:
      - 'main.go'
      - 'internal/**'
      - 'go.mod'
      - 'e2e/gnome/vm/**'
      - '.github/workflows/demos.yml'
  push:
    branches: [master]
    paths:
      - 'main.go'
      - 'internal/**'
      - 'go.mod'
      - 'e2e/gnome/vm/**'
      - '.github/workflows/demos.yml'
  workflow_dispatch:

concurrency:
  # A superseded PR run's video is stale — cancel it; master pushes each stand.
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != 'master' }}

permissions:
  contents: read

jobs:
  record:
    # Publishing to the sidecar needs the deploy-key secret, absent on fork PRs.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        series: [noble, resolute]
    env:
      UBUNTU_SERIES: ${{ matrix.series }}
      # Where in the sidecar this run's videos land.
      DEST: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || 'latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # `make demo` builds the fixed dispatcher binary (backend-go) on the host.
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install QEMU/KVM + cloud-image tooling + ffmpeg + gstreamer
        run: |
          sudo apt-get update -qq
          # gstreamer (rfbsrc in -plugins-bad, vp8/webmmux in -plugins-good) is
          # the host-side VNC recorder — see e2e/gnome/vm/record.sh.
          sudo apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils genisoimage netcat-openbsd ffmpeg webp \
            gstreamer1.0-tools gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad
          # GitHub-hosted runners expose /dev/kvm but not to the runner user.
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Compute image cache key (rotates weekly, mirrors e2e-gnome.yml)
        id: imgkey
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      # Same key as e2e-gnome.yml's VM leg, so the two workflows share one
      # provisioned desktop base (whichever runs first fills the cache).
      - name: Cache VM images (pristine + provisioned desktop base + SSH key)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/secrets-dispatcher/e2e/${{ matrix.series }}-server-cloudimg-amd64.img
            ~/.cache/secrets-dispatcher/e2e/desktop-base-${{ matrix.series }}.qcow2
            ~/.cache/secrets-dispatcher/e2e/id_ed25519
            ~/.cache/secrets-dispatcher/e2e/id_ed25519.pub
          key: e2e-vm-images-${{ matrix.series }}-${{ steps.imgkey.outputs.week }}-${{ hashFiles('e2e/gnome/vm/user-data') }}

      - run: make demo

      - name: Stage the recordings under the series name
        if: always()
        run: |
          mkdir -p out
          # trial = reversible `try`; install = permanent `service install`
          # (US-10); uninstall = the deliberate reversal. Tolerant copy so a
          # partial run still uploads whatever recorded.
          for demo in trial install uninstall; do
            for ext in webm mp4 webp; do
              [ -f ".build/demos/$demo.$ext" ] \
                && cp ".build/demos/$demo.$ext" "out/$demo-${{ matrix.series }}.$ext" || true
            done
          done
          ls -la out

      - name: Upload the recording artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: demo-${{ matrix.series }}-${{ github.event.pull_request.number || github.sha }}
          path: out/
          if-no-files-found: warn

      - name: Check out the media sidecar
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nikicat/secrets-dispatcher-ci-media
          ssh-key: ${{ secrets.CI_MEDIA_DEPLOY_KEY }}
          path: media

      - name: Publish the recording to the sidecar
        run: |
          set -euo pipefail
          mkdir -p "media/$DEST"
          cp out/*-${{ matrix.series }}.* "media/$DEST/"
          cd media
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "recording byte-identical to what's published; nothing to push"
            exit 0
          fi
          git commit -q -m "demos: $DEST/${{ matrix.series }} @ ${{ github.sha }}"
          # Both series legs push here concurrently — rebase-retry the race.
          for _ in 1 2 3 4 5; do
            git push && exit 0
            git pull --rebase --quiet
          done
          git push

      # Surface the recording in THIS leg's run summary, so the demo is viewable
      # from the commit's checks (Demos / record (<series>)) — no PR comment. The
      # webp is embedded via its sidecar raw URL (GitHub's image proxy fetches it
      # when the summary is viewed, well after the publish above); the full mp4
      # and webm link to GitHub Pages.
      - name: Add the recordings to the run summary
        if: always()
        run: |
          set -euo pipefail
          raw="https://raw.githubusercontent.com/nikicat/secrets-dispatcher-ci-media/main/$DEST"
          pages="https://nikicat.github.io/secrets-dispatcher-ci-media/$DEST"
          declare -A label=( [noble]="Ubuntu 24.04 (noble)" [resolute]="Ubuntu 26.04 (resolute)" )
          declare -A title=( [trial]="try — reversible trial" [install]="service install — make it permanent" [uninstall]="service uninstall — back to stock" )
          s="${{ matrix.series }}"
          {
            echo "## 🎬 Demos — ${label[$s]}"
            # Only include a demo whose webp actually staged (a flaked leg is skipped).
            for demo in trial install uninstall; do
              [ -f "out/$demo-$s.webp" ] || continue
              echo
              echo "### ${title[$demo]}"
              echo
              echo "[![$demo — $s]($raw/$demo-$s.webp)]($pages/$demo-$s.mp4)"
              echo
              echo "▶ [full video]($pages/$demo-$s.mp4) · [webm]($pages/$demo-$s.webm)"
            done
          } >> "$GITHUB_STEP_SUMMARY"
