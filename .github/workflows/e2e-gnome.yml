name: E2E GNOME

# Tier-1 (fast) GNOME e2e: real gnome-keyring behind the proxy on private
# D-Bus buses, no VM. Covers the US-6 prompt-forwarding regression (issue #1)
# and a secret round trip through the proxy against a real backend.
#
# Tier-2 (full) GNOME e2e: real Ubuntu desktop VM (qemu+KVM+cloud-init) with
# gdm autologin — the only honest coverage for the takeover acceptance gates
# (US-4 ownership, US-5 re-grab resistance across a session restart, US-9
# reversal). One VM leg per supported Ubuntu series (24.04 LTS + 26.04 LTS),
# in parallel on every PR (~1.5 min with warm image cache, ~4 min cold); the
# weekly cache key forces a fresh provision so Ubuntu package drift in each
# series' /current image still gets caught. The "full" job is the aggregate
# gate over the legs — branch protection requires a check named exactly
# "full", so that name must stay stable. See docs/plans/onboarding-and-e2e.md.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  fast:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install gnome-keyring stack
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            dbus dbus-daemon dbus-bin gnome-keyring libsecret-tools

      - run: make test-e2e-gnome

  vm:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        series: [noble, resolute]
    env:
      UBUNTU_SERIES: ${{ matrix.series }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install QEMU/KVM + cloud-image tooling
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            qemu-system-x86 qemu-utils cloud-image-utils genisoimage netcat-openbsd
          # GitHub-hosted runners expose /dev/kvm but not to the runner user.
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The provisioned desktop base is cached with a weekly-rotating key (no
      # restore-keys fallback, deliberately: on rollover the job re-provisions
      # from the series' current cloud image, so upstream drift is picked up
      # at least weekly). Both files must travel together — the qcow2 overlay
      # references the pristine image as its backing file.
      - name: Compute image cache key (rotates weekly)
        id: imgkey
        run: echo "week=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"

      # The SSH keypair is generated at provision time and baked into the
      # desktop base's authorized_keys, so it must travel with the base image
      # (a restored base is unreachable without it). Caching the private key
      # is fine: it authenticates only to a throwaway localhost-forwarded VM
      # that lives for minutes inside a runner.
      - name: Cache VM images (pristine + provisioned desktop base + SSH key)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/secrets-dispatcher/e2e/${{ matrix.series }}-server-cloudimg-amd64.img
            ~/.cache/secrets-dispatcher/e2e/desktop-base-${{ matrix.series }}.qcow2
            ~/.cache/secrets-dispatcher/e2e/id_ed25519
            ~/.cache/secrets-dispatcher/e2e/id_ed25519.pub
          key: e2e-vm-images-${{ matrix.series }}-${{ steps.imgkey.outputs.week }}

      - run: make test-e2e-gnome-vm

  # Aggregate gate over the VM matrix legs. Branch protection on master
  # requires a status check named exactly "full" (the pre-matrix VM job's
  # name); this job keeps that contract without touching repo settings.
  # if: always() is load-bearing — without it a failed leg would leave this
  # job "skipped", which branch protection counts as passing.
  full:
    needs: vm
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: All VM legs must succeed
        run: test "${{ needs.vm.result }}" = success
