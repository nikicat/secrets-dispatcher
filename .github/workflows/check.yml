name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1

      - run: make check
