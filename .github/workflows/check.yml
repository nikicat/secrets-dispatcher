name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          # .dvmrc is the single source of the deno pin (all jobs here plus
          # the release build). Pinned deliberately, not by float. Requires
          # @playwright/test >= 1.60: deno >= 2.9 ports Node 26.1 stream
          # semantics (nodejs/node#62557), which deadlock the fd-slicer
          # bundled in playwright <= 1.59 during browser-archive extraction.
          deno-version-file: .dvmrc

      - run: make check

  # The compiled frontend under internal/api/web/dist is committed so a plain
  # `go install` ships the full web UI. This job fails when it drifts from the
  # web/ sources — fix with `make embed-frontend` and commit the result.
  embed-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          # See the check job for why the .dvmrc pin exists.
          deno-version-file: .dvmrc

      - run: make embed-frontend

      - name: Committed embed must match a fresh build
        run: |
          git add -N internal/api/web/dist
          git diff --stat --exit-code internal/api/web/dist || {
            echo "::error::internal/api/web/dist is stale — run 'make embed-frontend' and commit the result"
            exit 1
          }

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: make test-go

  test-e2e:
    runs-on: ubuntu-latest
    # The suite takes ~2 minutes; a hang in browser install or test startup
    # must fail fast, not sit until the 6-hour GitHub default.
    timeout-minutes: 15
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          # See the check job for why the .dvmrc pin exists.
          deno-version-file: .dvmrc

      - run: make playwright-install BROWSER=${{ matrix.browser }}

      - run: make test-e2e-browser BROWSER=${{ matrix.browser }}
