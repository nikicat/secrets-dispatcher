name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build frontend
        run: make frontend && mkdir -p internal/api/web && cp -r web/dist internal/api/web/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }} -s -w" \
            -o secrets-dispatcher-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            secrets-dispatcher-${{ matrix.goos }}-${{ matrix.goarch }}
