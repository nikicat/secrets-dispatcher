name: Release

# Creating a GitHub release (the tag is the single source of version truth —
# there is no version file in the tree) triggers both the binary uploads and
# the AUR publish. workflow_dispatch republishes an existing release to the
# AUR (e.g. after a PKGBUILD template fix) without recreating the release.

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to republish to the AUR (e.g. v0.3.0)'
        required: true

# One release at a time; a queued newer release waits for the current one.
concurrency:
  group: release
  cancel-in-progress: false

env:
  TAG: ${{ inputs.tag || github.event.release.tag_name }}

jobs:
  build:
    name: build + upload release binaries
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x

      - name: Build frontend
        run: make frontend && mkdir -p internal/api/web && cp -r web/dist internal/api/web/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }} -s -w" \
            -o secrets-dispatcher-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} \
            secrets-dispatcher-${{ matrix.goos }}-${{ matrix.goarch }}

  build-pkgbuild:
    name: render + test-build PKGBUILD
    runs-on: ubuntu-latest
    container:
      # latest as of 2026-07-06
      image: archlinux:latest@sha256:681569955d1d17313ef7134acc8b5cd8adcda2fc24709bed472d95e1cf3d71a1
    steps:
      - name: Install build dependencies
        run: pacman -Syu --noconfirm --needed base-devel go deno git pacman-contrib

      # The triggering commit provides the PKGBUILD template; the *tag*
      # determines what the package builds (it's baked into source=()), so a
      # dispatch from a newer master can republish an old release with a
      # fixed template.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render PKGBUILD
        run: |
          mkdir -p /tmp/aur-build
          sed "s/@PKGVER@/${TAG#v}/" packaging/aur/PKGBUILD.in > /tmp/aur-build/PKGBUILD
          cp packaging/aur/secrets-dispatcher.install /tmp/aur-build/
          cp packaging/aur/gitignore /tmp/aur-build/.gitignore

      - name: Fill checksums and build the package as an unprivileged user
        run: |
          useradd -m builder
          chown -R builder /tmp/aur-build
          cd /tmp/aur-build
          # updpkgsums downloads the source tarball and writes real sha256sums
          # into the PKGBUILD; makepkg then verifies them, so the PKGBUILD we
          # publish is exactly what was test-built. --noconfirm because deps
          # are preinstalled above.
          sudo -u builder updpkgsums
          sudo -u builder makepkg -f --noconfirm
          sudo -u builder makepkg --printsrcinfo

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pkgbuild
          include-hidden-files: true
          path: |
            /tmp/aur-build/PKGBUILD
            /tmp/aur-build/secrets-dispatcher.install
            /tmp/aur-build/.gitignore

  publish-aur:
    name: push to AUR
    needs: build-pkgbuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pkgbuild

      # Checksums were already filled during the test build. Running updpkgsums
      # here would download the source tarball into the AUR repo checkout, and
      # with assets set the action stages it via `git add --all` — the AUR
      # rejects blobs over 488 KiB. The .gitignore asset guards the same
      # failure mode against future drift.
      - name: Publish secrets-dispatcher to the AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7 # v4.1.3
        with:
          pkgname: secrets-dispatcher
          pkgbuild: ./PKGBUILD
          assets: ./secrets-dispatcher.install ./.gitignore
          commit_username: Nikolay Bryskin
          commit_email: nikicat@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: 'Update to ${{ env.TAG }}'
          ssh_keyscan_types: ed25519
