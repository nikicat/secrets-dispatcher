name: Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.x  # Deno 2.6+ breaks Playwright's transform (Hash.update gets undefined)

      - run: make check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: make test-go

  test-e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.x  # Deno 2.6+ breaks Playwright's transform

      - run: make playwright-install BROWSER=${{ matrix.browser }}

      - run: make test-e2e-browser BROWSER=${{ matrix.browser }}
